name: Lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-commits:
    name: Lint commits
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - run: go mod download
      - name: Run commitsar
        uses: aevea/commitsar@v1.0.3
  lint-code:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Set up go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Check out code
        uses: actions/checkout@v7
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: "latest"
          args: "--verbose"
      - name: Install shellcheck
        run: sudo apt install shellcheck
      - name: Check shell bash scripts
        run: shellcheck ./data/completion/rhc.bash
  lint-language:
    name: Lint language
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Run woke
        uses: get-woke/woke-action@v0
        with:
          version: "latest"
          fail-on-error: true
